<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Instant Prizes</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--gold:#F5C842;--gold-dim:#C49A1A;--black:#080808;--surface:#111;--card:#161616;--border:rgba(255,255,255,0.07);--text:#E8E8E8;--muted:#555;--green:#22C55E;--red:#EF4444;--blue:#3B82F6}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:var(--black);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding:20px}
.wrap{max-width:800px;margin:0 auto}
header{padding:20px 0 16px;border-bottom:1px solid var(--border);margin-bottom:28px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:12px}
.logo-box{width:40px;height:40px;background:var(--gold);border-radius:10px;display:grid;place-items:center;font-size:20px}
.logo-name{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;color:var(--gold)}
.logo-sub{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.back-link{color:var(--muted);font-size:13px;text-decoration:none;display:flex;align-items:center;gap:6px}
.back-link:hover{color:var(--gold)}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:16px}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--gold);margin-bottom:18px}
label{display:block;font-size:12px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:7px;margin-top:14px}
label:first-child{margin-top:0}
input,select{width:100%;padding:11px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s;margin-bottom:4px}
input:focus,select:focus{border-color:rgba(245,200,66,.4)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.btn{padding:12px 22px;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
.btn-gold{background:var(--gold);color:#000}
.btn-gold:hover{background:#f7d155}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{border-color:rgba(245,200,66,.3);color:var(--gold)}
.btn-danger{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:var(--red)}
.btn-danger:hover{background:rgba(239,68,68,.2)}
.btn-sm{padding:7px 14px;font-size:12px}
.btn-full{width:100%;justify-content:center;margin-top:16px}
.alert{padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none}
.alert.show{display:block}
.alert-success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:var(--green)}
.alert-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:var(--red)}
.alert-info{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);color:var(--blue)}
.admin-row{display:flex;align-items:center;gap:10px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;flex-wrap:wrap}
.ar-main{flex:1;min-width:0}
.ar-name{font-weight:600;font-size:14px}
.ar-sub{font-size:11px;color:var(--muted);margin-top:2px}
.ar-actions{display:flex;gap:6px;flex-shrink:0}
.list-item{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:8px}
.li-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-dim));display:grid;place-items:center;font-size:14px;font-weight:700;color:#000;flex-shrink:0}
.li-main{flex:1;min-width:0}
.li-name{font-weight:600;font-size:14px}
.li-sub{font-size:11px;color:var(--muted);margin-top:2px}
.li-right{text-align:right;flex-shrink:0}
.prize-table{width:100%;border-collapse:collapse}
.prize-table th{text-align:left;font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;padding:8px 12px;border-bottom:1px solid var(--border)}
.prize-table td{padding:10px 12px;font-size:13px;border-bottom:1px solid rgba(255,255,255,0.04)}
.prize-table tr:last-child td{border-bottom:none}
.badge-green{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2);border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600}
.badge-gold{background:rgba(245,200,66,.1);color:var(--gold);border:1px solid rgba(245,200,66,.2);border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600}
.tabs{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:5px;margin-bottom:28px;overflow-x:auto}
.tab{flex:0 0 auto;padding:10px 16px;background:transparent;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;border-radius:10px;cursor:pointer;transition:all .2s;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{background:var(--card);color:var(--gold)}
.section{display:none}
.section.active{display:block}
.empty{text-align:center;padding:32px;color:var(--muted)}
@media(max-width:540px){
  .grid-2{grid-template-columns:1fr}
  .ar-actions{width:100%}
  body{padding:12px}
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">
      <div class="logo-box">🎰</div>
      <div>
        <div class="logo-name">Admin Panel</div>
        <div class="logo-sub">Instant Prizes</div>
      </div>
    </div>
    <a href="/" class="back-link">← Back to site</a>
  </header>

  <!-- LOGIN -->
  <div id="login-view" class="card">
    <div class="card-title">🔐 Admin Login</div>
    <div id="login-alert" class="alert"></div>
    <label>Password</label>
    <input type="password" id="admin-pass" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')adminLogin()" />
    <button class="btn btn-gold btn-full" onclick="adminLogin()">Login</button>
  </div>

  <!-- PANEL -->
  <div id="admin-view" style="display:none">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('competitions',this)">🏆 Competitions</button>
      <button class="tab" onclick="switchTab('prizes',this)">💰 Prizes</button>
      <button class="tab" onclick="switchTab('draws',this)">📋 Draw Log</button>
    </div>

    <!-- COMPETITIONS -->
    <div id="sec-competitions" class="section active">
      <div class="card">
        <div class="card-title">Create Competition</div>
        <div id="create-alert" class="alert"></div>
        <label>Name</label>
        <input type="text" id="new-name" placeholder="e.g. 50% Cash Pool — June 2026" />
        <div class="grid-2">
          <div><label>Total Tickets</label><input type="number" id="new-tickets" value="10000" min="1" /></div>
          <div><label>Max Draws per User</label><input type="number" id="new-maxdraws" value="1" min="1" /></div>
        </div>
        <label>Raffall Link</label>
        <input type="text" id="new-link" placeholder="https://raffall.com/..." />
        <button class="btn btn-gold btn-full" onclick="createCompetition()">✅ Create Competition</button>
      </div>
      <div class="card">
        <div class="card-title">All Competitions</div>
        <div id="admin-comp-list"></div>
      </div>
    </div>

    <!-- PRIZES -->
    <div id="sec-prizes" class="section">
      <div class="card">
        <div class="card-title">Add Prize</div>
        <div id="prize-alert" class="alert"></div>
        <label>Competition</label>
        <select id="prize-comp-select" onchange="loadAdminPrizes()"></select>
        <div class="grid-2">
          <div><label>Ticket Number</label><input type="number" id="prize-ticket" placeholder="e.g. 547" min="1" /></div>
          <div><label>Prize</label><input type="text" id="prize-value" placeholder="e.g. £100 Cash" /></div>
        </div>
        <button class="btn btn-gold btn-full" onclick="addPrize()">➕ Add Prize</button>
        <div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--border)">
          <div style="font-size:12px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px">Prize List</div>
          <div id="admin-prizes-list"></div>
        </div>
      </div>
    </div>

    <!-- DRAWS LOG -->
    <div id="sec-draws" class="section">
      <div class="card">
        <div class="card-title">Draw Log</div>
        <select id="draws-filter" onchange="loadDraws()" style="margin-bottom:14px">
          <option value="">All Competitions</option>
        </select>
        <div id="admin-draws-list"></div>
      </div>
    </div>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzIQ2b2agqHqnTkQ9NZKKUGT-CZtbQjie1Zd_JziJPW2Q4iwNOIGoDDLp5SUzAboqDejw/exec";
let adminPass = "";
let competitions = [];

async function apiFetch(params){ const r=await fetch(API_URL+"?"+new URLSearchParams(params)); return r.json(); }
async function apiPost(body){ const r=await fetch(API_URL+"?"+new URLSearchParams({action:body.action,body:JSON.stringify(body)})); return r.json(); }

async function adminLogin(){
  const pass=document.getElementById('admin-pass').value;
  if(!pass)return;
  const d=await apiPost({action:'checkAdmin',password:pass});
  if(!d.ok)return showAlert('login-alert','error','Incorrect password.');
  adminPass=pass;
  document.getElementById('login-view').style.display='none';
  document.getElementById('admin-view').style.display='block';
  await refresh();
}

async function refresh(){
  const d=await apiFetch({action:'getCompetitions'});
  competitions=d.competitions||[];
  renderComps();
  populateSelects();
  loadAdminPrizes();
  loadDraws();
}

function switchTab(name,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('sec-'+name).classList.add('active');
}

function renderComps(){
  const el=document.getElementById('admin-comp-list');
  if(!competitions.length){el.innerHTML='<div class="empty">No competitions yet.</div>';return;}
  el.innerHTML=competitions.map(c=>`
    <div class="admin-row">
      <div class="ar-main">
        <div class="ar-name">${esc(c.name)}</div>
        <div class="ar-sub">${c.totalTickets.toLocaleString()} tickets · ${c.maxDraws} draw${c.maxDraws!==1?'s':''}/user · ${c.active?'🟢 Active':'🔴 Paused'}</div>
      </div>
      <div class="ar-actions">
        <button class="btn btn-ghost btn-sm" onclick="openEditModal('${c.id}')">✏️ Edit</button>
        <button class="btn btn-ghost btn-sm" onclick="toggleComp('${c.id}')">${c.active?'Pause':'Activate'}</button>
        <button class="btn btn-danger btn-sm" onclick="deleteComp('${c.id}')">Delete</button>
      </div>
    </div>`).join('');
}

function populateSelects(){
  const opts=competitions.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('');
  ['prize-comp-select','draws-filter'].forEach(id=>{
    const el=document.getElementById(id);
    if(!el)return;
    const hasAll=id==='draws-filter';
    el.innerHTML=(hasAll?'<option value="">All Competitions</option>':'')+opts;
  });
}

async function createCompetition(){
  const name=document.getElementById('new-name').value.trim();
  if(!name)return showAlert('create-alert','error','Enter a name.');
  showAlert('create-alert','info','Creating...');
  const d=await apiPost({action:'createCompetition',password:adminPass,name,
    totalTickets:document.getElementById('new-tickets').value,
    maxDraws:document.getElementById('new-maxdraws').value,
    raffalLink:document.getElementById('new-link').value.trim()});
  if(d.error)return showAlert('create-alert','error',d.error);
  showAlert('create-alert','success','✅ Created!');
  document.getElementById('new-name').value='';
  document.getElementById('new-link').value='';
  await refresh();
}

async function toggleComp(id){
  await apiPost({action:'toggleCompetition',password:adminPass,id});
  await refresh();
}

async function deleteComp(id){
  if(!confirm('Delete this competition?'))return;
  await apiPost({action:'deleteCompetition',password:adminPass,id});
  await refresh();
}

async function addPrize(){
  const compId=document.getElementById('prize-comp-select').value;
  const ticket=document.getElementById('prize-ticket').value;
  const prize=document.getElementById('prize-value').value.trim();
  if(!compId)return showAlert('prize-alert','error','Select a competition.');
  if(!ticket)return showAlert('prize-alert','error','Enter ticket number.');
  if(!prize)return showAlert('prize-alert','error','Enter prize description.');
  showAlert('prize-alert','info','Adding...');
  const d=await apiPost({action:'addPrize',password:adminPass,compId,ticket,prize});
  if(d.error)return showAlert('prize-alert','error',d.error);
  showAlert('prize-alert','success',`✅ Prize on ticket #${ticket} added!`);
  document.getElementById('prize-ticket').value='';
  document.getElementById('prize-value').value='';
  loadAdminPrizes();
}

async function loadAdminPrizes(){
  const compId=document.getElementById('prize-comp-select').value;
  if(!compId){document.getElementById('admin-prizes-list').innerHTML='<p style="font-size:13px;color:var(--muted)">Select a competition.</p>';return;}
  const d=await apiFetch({action:'getPrizes',compId});
  const prizes=(d.prizes||[]).sort((a,b)=>a.ticket-b.ticket);
  const el=document.getElementById('admin-prizes-list');
  if(!prizes.length){el.innerHTML='<p style="font-size:13px;color:var(--muted)">No prizes yet.</p>';return;}
  el.innerHTML=`<table class="prize-table">
    <thead><tr><th>Ticket #</th><th>Prize</th><th>Status</th><th>Won By</th><th></th></tr></thead>
    <tbody>${prizes.map(p=>`<tr>
      <td><span style="font-family:'DM Mono',monospace;color:var(--gold)">#${p.ticket}</span></td>
      <td style="font-weight:600">${esc(p.prize)}</td>
      <td>${p.claimed?'<span class="badge-green">✓ Claimed</span>':'<span class="badge-gold">Available</span>'}</td>
      <td style="font-size:12px;color:var(--muted)">${p.claimed?esc(p.claimedBy):'—'}</td>
      <td>${!p.claimed?`<button class="btn btn-danger btn-sm" onclick="deletePrize('${p.id}')">✕</button>`:''}
      </td></tr>`).join('')}
    </tbody></table>`;
}

async function deletePrize(id){
  if(!confirm('Delete this prize?'))return;
  await apiPost({action:'deletePrize',password:adminPass,id});
  loadAdminPrizes();
}

async function loadDraws(){
  const compId=document.getElementById('draws-filter').value;
  const d=await apiFetch({action:'getDraws',compId:compId||''});
  const draws=(d.draws||[]).slice().reverse().slice(0,100);
  const el=document.getElementById('admin-draws-list');
  if(!draws.length){el.innerHTML='<div class="empty">No draws yet.</div>';return;}
  el.innerHTML=draws.map(dr=>`
    <div class="list-item">
      <div class="li-avatar">${(dr.username[0]||'?').toUpperCase()}</div>
      <div class="li-main">
        <div class="li-name">${esc(dr.username)}</div>
        <div class="li-sub">${esc(dr.compName)} · Ticket #${dr.ticket}</div>
      </div>
      <div class="li-right">
        <div style="font-size:13px;color:${dr.won?'var(--green)':'var(--muted)'};font-weight:600">${dr.won?'🏆 '+esc(dr.prize):'No prize'}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">${fmtDate(dr.drawnAt)}</div>
      </div>
    </div>`).join('');
}

function showAlert(id,type,msg){
  const el=document.getElementById(id);if(!el)return;
  el.className=`alert alert-${type} show`;el.textContent=msg;
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),5000);
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(s){if(!s)return'';const d=new Date(s);return isNaN(d)?s:d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}

function openEditModal(id) {
  const c = competitions.find(x => String(x.id) === String(id));
  if (!c) return;
  document.getElementById('edit-id').value = c.id;
  document.getElementById('edit-name').value = c.name;
  document.getElementById('edit-tickets').value = c.totalTickets;
  document.getElementById('edit-maxdraws').value = c.maxDraws;
  document.getElementById('edit-link').value = c.raffalLink || '';
  document.getElementById('edit-modal').style.display = 'flex';
  document.getElementById('edit-alert').classList.remove('show');
}

function closeEditModal() {
  document.getElementById('edit-modal').style.display = 'none';
}

async function saveEdit() {
  const id       = document.getElementById('edit-id').value;
  const name     = document.getElementById('edit-name').value.trim();
  const tickets  = document.getElementById('edit-tickets').value;
  const maxDraws = document.getElementById('edit-maxdraws').value;
  const link     = document.getElementById('edit-link').value.trim();
  if (!name) return showAlert('edit-alert','error','Name is required.');
  showAlert('edit-alert','info','Saving...');
  const d = await apiPost({
    action:'updateCompetition', password:adminPass,
    id, name, totalTickets:tickets, maxDraws, raffalLink:link
  });
  if (d.error) return showAlert('edit-alert','error',d.error);
  showAlert('edit-alert','success','✅ Saved!');
  await refresh();
  setTimeout(closeEditModal, 1200);
}

document.addEventListener('keydown', e => { if(e.key==='Escape') closeEditModal(); });

</script>

<!-- EDIT COMPETITION MODAL -->
<div id="edit-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;padding:20px;align-items:center;justify-content:center;backdrop-filter:blur(4px)">
  <div style="background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:500px;position:relative;max-height:90vh;overflow-y:auto">
    <button onclick="closeEditModal()" style="position:absolute;top:16px;right:16px;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer">✕</button>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--gold);margin-bottom:20px">Edit Competition</div>
    <div id="edit-alert" class="alert"></div>
    <input type="hidden" id="edit-id">
    <label>Competition Name</label>
    <input type="text" id="edit-name" placeholder="Competition name" />
    <div class="grid-2">
      <div>
        <label>Total Tickets</label>
        <input type="number" id="edit-tickets" min="1" />
      </div>
      <div>
        <label>Max Draws per User</label>
        <input type="number" id="edit-maxdraws" min="1" />
      </div>
    </div>
    <label>Raffall Link</label>
    <input type="text" id="edit-link" placeholder="https://raffall.com/..." />
    <button class="btn btn-gold btn-full" onclick="saveEdit()" style="margin-top:20px">💾 Save Changes</button>
  </div>
</div>

</body>
</html>
